<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GGX SERVICES</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#060606;font-family:'Inter',sans-serif;overflow-x:hidden;min-height:100vh;color:#fff;-webkit-font-smoothing:antialiased}
::selection{background:#fff;color:#000}
::-webkit-scrollbar{width:1px}
::-webkit-scrollbar-thumb{background:#1e1e1e}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-size:48px 48px;background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);}
.hero{position:relative;z-index:10;padding:80px 32px 52px;text-align:center}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:99px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02);margin-bottom:24px}
.hero-badge .dot{width:5px;height:5px;border-radius:50%;background:#00ffe0;box-shadow:0 0 8px #00ffe0;animation:blink 2s ease-in-out infinite;flex-shrink:0}
.hero-badge span{font-size:7.5px;color:rgba(255,255,255,.3);font-weight:400;letter-spacing:.3em;text-transform:uppercase}
.hero h1{font-family:'Orbitron',sans-serif;font-size:clamp(2.2rem,6.5vw,5rem);font-weight:900;letter-spacing:.06em;line-height:1.0;background:linear-gradient(160deg,#fff 0%,rgba(255,255,255,.5) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.hero-rule{width:1px;height:40px;background:linear-gradient(180deg,rgba(255,255,255,.15),transparent);margin:24px auto 0}
.media-wrap{position:relative;z-index:10;max-width:820px;margin:0 auto;padding:0 20px 32px;display:none}
.media-wrap.active{display:block}
.yt-frame{position:relative;width:100%;padding-bottom:56.25%;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.06);background:#000;margin-bottom:12px}
.yt-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.aplayer{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px 18px;margin-bottom:12px}
.apbtn{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s}
.apbtn:hover{transform:scale(1.08);background:#e8e8e8}
.apbtn svg{width:12px;height:12px;fill:#000}
.apbtn.pl svg.ipl{display:none}
.apbtn.pl svg.ipa{display:block!important}
svg.ipa{display:none}
.ainfo{flex:1;min-width:0}
.atrack{font-size:11px;font-weight:500;color:rgba(255,255,255,.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:9px;letter-spacing:.03em}
.aprog{height:2px;background:rgba(255,255,255,.08);border-radius:99px;cursor:pointer;position:relative}
.apfill{height:100%;background:#fff;border-radius:99px;width:0%;transition:width .1s linear;pointer-events:none}
.atime{font-size:8px;color:rgba(255,255,255,.2);letter-spacing:.1em;margin-top:5px}
.avol{display:flex;align-items:center;gap:7px;flex-shrink:0}
.avol svg{width:12px;height:12px;stroke:rgba(255,255,255,.2);fill:none;stroke-width:1.5;flex-shrink:0}
input[type=range].avolin{-webkit-appearance:none;width:52px;height:2px;background:rgba(255,255,255,.1);border-radius:99px;outline:none;cursor:pointer}
input[type=range].avolin::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#fff;cursor:pointer}
.navbar{position:sticky;top:0;z-index:100;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(6,6,6,.97);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.045)}
.pg-nav{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none}
.pg-nav::-webkit-scrollbar{display:none}
.pg-btn{font-size:8px;letter-spacing:.18em;padding:4px 11px;border-radius:99px;border:1px solid transparent;background:transparent;color:rgba(255,255,255,.22);cursor:pointer;transition:all .2s;text-transform:uppercase;font-family:'Inter',sans-serif;font-weight:500;white-space:nowrap;flex-shrink:0}
.pg-btn:hover{color:rgba(255,255,255,.6)}
.pg-btn.on{border-color:rgba(255,255,255,.16);color:#fff;background:rgba(255,255,255,.05)}
.pages{position:relative;z-index:10}
.pg{display:none;padding:2px 2px 80px}
.pg.on{display:block}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;max-width:1600px;margin:0 auto}
@media(max-width:1100px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:680px){.grid{grid-template-columns:repeat(2,1fr)}}
.card{background:#0c0c0c;overflow:hidden;position:relative;opacity:0;transform:translateY(10px);transition:opacity .5s,transform .5s}
.card.show{opacity:1;transform:translateY(0)}
.cimgw{aspect-ratio:1/1;overflow:hidden;background:#080808;position:relative}
.cimg{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s cubic-bezier(.22,1,.36,1),filter .4s}
.card:hover .cimg{transform:scale(1.05);filter:brightness(1.06)}
.cov{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.55) 100%);opacity:0;transition:opacity .3s;pointer-events:none}
.card:hover .cov{opacity:1}
.shopbtn{display:flex;width:100%;padding:11px 0;background:#fff;color:#000;font-size:8px;letter-spacing:.3em;font-weight:500;text-transform:uppercase;text-align:center;justify-content:center;text-decoration:none;border:none;cursor:pointer;opacity:0;transform:translateY(4px);transition:opacity .2s,transform .2s,background .15s;font-family:'Inter',sans-serif}
.card:hover .shopbtn{opacity:1;transform:translateY(0)}
.shopbtn:hover{background:#ebebeb}
.eslot{aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border:1px dashed rgba(255,255,255,.04);cursor:default;transition:border-color .25s,background .25s}
.edit-mode .eslot{cursor:pointer}
.edit-mode .eslot:hover{border-color:rgba(255,255,255,.14);background:rgba(255,255,255,.015)}
.edit-mode .eslot:hover .ei{opacity:.3}
.edit-mode .eslot:hover .el{color:rgba(255,255,255,.28)}
.ei{opacity:.06;transition:opacity .25s}
.el{font-size:7px;letter-spacing:.22em;color:rgba(255,255,255,.08);text-transform:uppercase;font-weight:400;transition:color .25s}
.eslot.dov{border-color:rgba(255,255,255,.35)!important;background:rgba(255,255,255,.03)!important}
.rm{display:none;position:absolute;top:7px;right:7px;z-index:10;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.82);border:1px solid rgba(255,255,255,.1);align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s;padding:0}
.edit-mode .rm{display:flex}
.rm:hover{background:rgba(200,20,40,.85);border-color:rgba(200,20,40,.5)}
.rm svg{width:8px;height:8px;stroke:#fff;stroke-width:2.5;fill:none}
.owner-lock{position:fixed;bottom:22px;right:22px;z-index:300}
.lockbtn{width:36px;height:36px;border-radius:99px;background:rgba(10,10,10,.95);border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(12px);transition:border-color .2s}
.lockbtn:hover{border-color:rgba(255,255,255,.18)}
.lockbtn svg{width:13px;height:13px;stroke:rgba(255,255,255,.3);fill:none;stroke-width:1.5}
.lockbtn.on svg{stroke:#00ffe0}
.ownerbar{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:200;display:none;align-items:center;gap:7px;background:rgba(8,8,8,.98);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.07);border-radius:99px;padding:7px 12px}
.ownerbar.open{display:flex}
.obbtn{font-size:7.5px;letter-spacing:.16em;padding:5px 13px;border-radius:99px;border:1px solid rgba(255,255,255,.09);background:transparent;color:rgba(255,255,255,.4);cursor:pointer;transition:all .18s;text-transform:uppercase;font-family:'Inter',sans-serif;white-space:nowrap}
.obbtn:hover{border-color:rgba(255,255,255,.25);color:#fff}
.obbtn.on{border-color:rgba(255,255,255,.9);background:#fff;color:#000}
.obsep{width:1px;height:16px;background:rgba(255,255,255,.07);flex-shrink:0}
.pwbg{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);align-items:center;justify-content:center}
.pwbg.open{display:flex}
.pwbox{background:#0c0c0c;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:36px;width:min(340px,88vw);text-align:center}
.pwbox svg{width:26px;height:26px;stroke:rgba(255,255,255,.18);fill:none;stroke-width:1.2;margin-bottom:20px}
.pwbox h3{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:.3em;color:rgba(255,255,255,.35);margin-bottom:22px;text-transform:uppercase}
.pwin{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:12px;color:#fff;font-size:18px;font-family:'Inter',sans-serif;outline:none;text-align:center;letter-spacing:.25em;transition:border-color .2s}
.pwin:focus{border-color:rgba(255,255,255,.18)}
.pwerr{font-size:7.5px;color:rgba(255,100,100,.6);letter-spacing:.15em;margin-top:9px;height:14px;text-transform:uppercase}
.pwok{width:100%;padding:12px;border-radius:8px;margin-top:14px;background:#fff;color:#000;border:none;cursor:pointer;font-size:8px;letter-spacing:.25em;text-transform:uppercase;font-family:'Inter',sans-serif;font-weight:500;transition:background .15s}
.pwok:hover{background:#e8e8e8}
.pwcancel{background:none;border:none;color:rgba(255,255,255,.15);cursor:pointer;font-size:8px;letter-spacing:.15em;text-transform:uppercase;font-family:'Inter',sans-serif;margin-top:11px;display:block;width:100%;transition:color .2s}
.pwcancel:hover{color:rgba(255,255,255,.4)}
.smbg{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);align-items:center;justify-content:center}
.smbg.open{display:flex}
.smbox{background:#0c0c0c;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:26px;width:min(420px,88vw)}
.smbox h3{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:.25em;color:rgba(255,255,255,.28);margin-bottom:16px;text-transform:uppercase}
.smin{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:11px 13px;color:#fff;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.smin:focus{border-color:rgba(255,255,255,.18)}
.smhint{font-size:7.5px;color:rgba(255,255,255,.16);margin-top:7px;line-height:1.6;letter-spacing:.04em}
.smacts{display:flex;gap:6px;margin-top:13px;flex-wrap:wrap}
.smok{flex:1;min-width:100px;padding:10px;border-radius:8px;background:#fff;color:#000;border:none;cursor:pointer;font-size:8px;letter-spacing:.2em;text-transform:uppercase;font-family:'Inter',sans-serif;font-weight:500;transition:background .15s}
.smok:hover{background:#e0e0e0}
.smsec{padding:10px 13px;border-radius:8px;flex-shrink:0;background:transparent;color:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.07);cursor:pointer;font-size:8px;letter-spacing:.12em;text-transform:uppercase;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap}
.smsec:hover{border-color:rgba(255,255,255,.22);color:rgba(255,255,255,.7)}
.mmbg{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);align-items:center;justify-content:center}
.mmbg.open{display:flex}
.mmbox{background:#0c0c0c;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:26px;width:min(460px,88vw)}
.mmbox h3{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:.25em;color:rgba(255,255,255,.28);margin-bottom:18px;text-transform:uppercase}
.mrow{margin-bottom:13px}
.mrow label{font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.22);display:block;margin-bottom:6px;font-weight:500}
.msave{width:100%;padding:11px;border-radius:8px;margin-top:6px;background:#fff;color:#000;border:none;cursor:pointer;font-size:8px;letter-spacing:.22em;text-transform:uppercase;font-family:'Inter',sans-serif;font-weight:500;transition:background .15s}
.msave:hover{background:#e0e0e0}
.mclear{width:100%;padding:9px;border-radius:8px;margin-top:6px;background:transparent;color:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.06);cursor:pointer;font-size:8px;letter-spacing:.15em;text-transform:uppercase;font-family:'Inter',sans-serif;transition:all .15s}
.mclear:hover{color:rgba(255,255,255,.5);border-color:rgba(255,255,255,.15)}
.mcancel{width:100%;padding:8px;border-radius:8px;margin-top:5px;background:transparent;border:none;color:rgba(255,255,255,.13);cursor:pointer;font-size:8px;letter-spacing:.15em;text-transform:uppercase;font-family:'Inter',sans-serif;transition:color .2s}
.mcancel:hover{color:rgba(255,255,255,.38)}
.dots{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:4px;background:rgba(6,6,6,.92);backdrop-filter:blur(12px);padding:8px 13px;border-radius:99px;border:1px solid rgba(255,255,255,.045)}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.1);border:none;cursor:pointer;transition:background .2s,transform .2s;padding:0}
.dot.on{background:#fff;transform:scale(1.4)}
.tip{position:fixed;top:56px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.92);color:#000;font-size:7px;letter-spacing:.22em;text-transform:uppercase;font-weight:500;padding:5px 14px;border-radius:99px;z-index:700;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
.tip.show{opacity:1}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-badge"><span class="dot"></span><span>Boutique en ligne</span></div>
  <h1>GGX SERVICES</h1>
  <div class="hero-rule"></div>
</div>
<div class="media-wrap" id="mwrap"><div id="ytC"></div><div id="auC"></div></div>
<div class="navbar"><nav class="pg-nav" id="nav"></nav><div style="width:36px"></div></div>
<div class="pages" id="pages"></div>
<div class="dots" id="dots"></div>
<div class="owner-lock">
  <button class="lockbtn" id="lockbtn" onclick="clickLock()">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
  </button>
</div>
<div class="ownerbar" id="ownerbar">
  <button class="obbtn" id="editbtn" onclick="toggleEdit()">+ Ajouter</button>
  <div class="obsep"></div>
  <button class="obbtn" onclick="openMM()">Medias</button>
  <div class="obsep"></div>
  <button class="obbtn" onclick="lockDown()">Verrouiller</button>
</div>
<div class="pwbg" id="pwbg">
  <div class="pwbox">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    <h3>Acces proprietaire</h3>
    <input class="pwin" id="pwin" type="password" placeholder="..." maxlength="30"/>
    <div class="pwerr" id="pwerr"></div>
    <button class="pwok" onclick="checkPw()">Entrer</button>
    <button class="pwcancel" onclick="closePw()">Annuler</button>
  </div>
</div>
<div class="smbg" id="smbg">
  <div class="smbox">
    <h3>Ajouter une image</h3>
    <input class="smin" id="urlin" type="text" placeholder="https://exemple.com/image.jpg" spellcheck="false"/>
    <div class="smhint">URL directe vers une image ou glisser-deposer sur la case</div>
    <div class="smacts">
      <button class="smok" onclick="confirmUrl()">Confirmer URL</button>
      <button class="smsec" id="filebtn">Fichier local</button>
      <button class="smsec" onclick="closeSM()">X</button>
    </div>
  </div>
</div>
<div class="mmbg" id="mmbg">
  <div class="mmbox">
    <h3>Medias YouTube et Audio</h3>
    <div class="mrow"><label>Lien YouTube</label><input class="smin" id="ytin" type="text" placeholder="https://youtube.com/watch?v=..."/></div>
    <div class="mrow"><label>Lien audio MP3</label><input class="smin" id="auin" type="text" placeholder="https://exemple.com/track.mp3"/></div>
    <div class="mrow"><label>Titre du morceau</label><input class="smin" id="autitle" type="text" placeholder="Nom du track..."/></div>
    <button class="msave" onclick="saveMedia()">Enregistrer</button>
    <button class="mclear" onclick="clearMedia()">Supprimer les medias</button>
    <button class="mcancel" onclick="closeMM()">Annuler</button>
  </div>
</div>
<div class="tip" id="tip"></div>
<script>
var SHOP="https://whop.com/ai-ggx";
var PW="ggx2025";
var TOTAL=80,PERP=10,NP=8;
var imgs=new Array(TOTAL).fill(null);
var edit=false,unlocked=false,pslot=null,curpg=0,aEl=null;
function lload(){try{var d=JSON.parse(localStorage.getItem('ggxv3')||'{}');if(Array.isArray(d.i)&&d.i.length===TOTAL)imgs=d.i;}catch(e){}}
function lsave(){try{localStorage.setItem('ggxv3',JSON.stringify({i:imgs}));}catch(e){}}
function mload(){try{return JSON.parse(localStorage.getItem('ggxv3m')||'{}');}catch(e){return {};}}
function msave2(d){try{localStorage.setItem('ggxv3m',JSON.stringify(d));}catch(e){}}
lload();
var fi=document.createElement('input');fi.type='file';fi.accept='image/*';fi.style.display='none';
document.body.appendChild(fi);
document.getElementById('filebtn').onclick=function(){closeSM();fi.click();};
fi.onchange=function(){if(!fi.files[0]||pslot===null)return;var r=new FileReader();r.onload=function(e){setImg(pslot,e.target.result);};r.readAsDataURL(fi.files[0]);fi.value='';};
var navEl=document.getElementById('nav'),dotsEl=document.getElementById('dots'),pagesEl=document.getElementById('pages');
for(var p=0;p<NP;p++){(function(idx){
  var b=document.createElement('button');b.className='pg-btn'+(idx===0?' on':'');b.textContent='0'+(idx+1);b.onclick=function(){goPage(idx);};navEl.appendChild(b);
  var d=document.createElement('button');d.className='dot'+(idx===0?' on':'');d.onclick=function(){goPage(idx);};dotsEl.appendChild(d);
  var s=document.createElement('div');s.className='pg'+(idx===0?' on':'');s.id='pg'+idx;
  var g=document.createElement('div');g.className='grid';g.id='gr'+idx;s.appendChild(g);pagesEl.appendChild(s);
})(p);}
function render(){for(var p=0;p<NP;p++){var g=document.getElementById('gr'+p);g.innerHTML='';var s=p*PERP,e=Math.min(s+PERP,TOTAL);for(var i=s;i<e;i++)g.appendChild(makeSlot(i));}}
function makeSlot(i){
  var w=document.createElement('div');w.className='card';
  if(imgs[i]){
    w.innerHTML='<div class="cimgw"><img class="cimg" src="'+imgs[i]+'" alt="" loading="lazy"/><div class="cov"></div><button class="rm" onclick="delImg('+i+',event)"><svg viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg></button></div><a class="shopbtn" href="'+SHOP+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">SHOP</a>';
    w.addEventListener('click',function(){window.open(SHOP,'_blank');});
  } else {
    var em=document.createElement('div');em.className='eslot';
    em.innerHTML='<svg class="ei" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width=".9"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg><span class="el">Ajouter</span>';
    (function(idx){
      em.addEventListener('click',function(){if(edit)openSM(idx);});
      em.addEventListener('dragover',function(e){e.preventDefault();em.classList.add('dov');});
      em.addEventListener('dragleave',function(){em.classList.remove('dov');});
      em.addEventListener('drop',function(e){e.preventDefault();em.classList.remove('dov');var f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/')){var r=new FileReader();r.onload=function(ev){setImg(idx,ev.target.result);};r.readAsDataURL(f);}else{var u=e.dataTransfer.getData('text/plain')||e.dataTransfer.getData('text/uri-list');if(u)setImg(idx,u.trim());}});
    })(i);
    w.appendChild(em);
  }
  return w;
}
function setImg(i,src){imgs[i]=src;lsave();render();revealPg(curpg);tip('Image ajoutee');}
function delImg(i,e){e.stopPropagation();imgs[i]=null;lsave();render();revealPg(curpg);}
function clickLock(){if(unlocked){lockDown();}else{document.getElementById('pwbg').classList.add('open');setTimeout(function(){document.getElementById('pwin').focus();},80);}}
function checkPw(){if(document.getElementById('pwin').value===PW){unlocked=true;closePw();document.getElementById('lockbtn').classList.add('on');document.getElementById('ownerbar').classList.add('open');tip('Mode proprietaire');}else{document.getElementById('pwerr').textContent='Mot de passe incorrect';document.getElementById('pwin').value='';}}
function closePw(){document.getElementById('pwbg').classList.remove('open');document.getElementById('pwin').value='';document.getElementById('pwerr').textContent='';}
function lockDown(){unlocked=false;edit=false;document.getElementById('lockbtn').classList.remove('on');document.getElementById('ownerbar').classList.remove('open');document.getElementById('editbtn').classList.remove('on');document.getElementById('editbtn').textContent='+ Ajouter';pagesEl.classList.remove('edit-mode');}
document.getElementById('pwin').addEventListener('keydown',function(e){if(e.key==='Enter')checkPw();if(e.key==='Escape')closePw();});
function toggleEdit(){if(!unlocked)return;edit=!edit;var b=document.getElementById('editbtn');b.classList.toggle('on',edit);b.textContent=edit?'Termine':'+ Ajouter';pagesEl.classList.toggle('edit-mode',edit);if(edit)tip('Cliquez sur une case pour ajouter');}
function goPage(idx){curpg=idx;document.querySelectorAll('.pg').forEach(function(s,i){s.classList.toggle('on',i===idx);});document.querySelectorAll('.pg-btn').forEach(function(b,i){b.classList.toggle('on',i===idx);});document.querySelectorAll('.dot').forEach(function(d,i){d.classList.toggle('on',i===idx);});window.scrollTo({top:0,behavior:'smooth'});revealPg(idx);}
function revealPg(idx){document.querySelectorAll('#gr'+idx+' .card').forEach(function(c,i){c.classList.remove('show');setTimeout(function(){c.classList.add('show');},i*28);});}
function openSM(i){pslot=i;document.getElementById('urlin').value='';document.getElementById('smbg').classList.add('open');setTimeout(function(){document.getElementById('urlin').focus();},80);}
function closeSM(){document.getElementById('smbg').classList.remove('open');}
function confirmUrl(){var v=document.getElementById('urlin').value.trim();if(v&&pslot!==null)setImg(pslot,v);closeSM();}
document.getElementById('urlin').addEventListener('keydown',function(e){if(e.key==='Enter')confirmUrl();if(e.key==='Escape')closeSM();});
function ytid(u){var m=u.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);return m?m[1]:null;}
function fmtt(s){var m=Math.floor(s/60),sc=Math.floor(s%60);return m+':'+(sc<10?'0':'')+sc;}
function buildAudio(url,title){var c=document.getElementById('auC');c.innerHTML='';if(!url)return;aEl=new Audio(url);aEl.preload='metadata';c.innerHTML='<div class="aplayer"><button class="apbtn" id="apbtn" onclick="toggleA()"><svg class="ipl" viewBox="0 0 12 14"><path d="M1 1l10 6L1 13V1z"/></svg><svg class="ipa" viewBox="0 0 11 13"><rect x="0" y="0" width="3.5" height="13"/><rect x="7" y="0" width="3.5" height="13"/></svg></button><div class="ainfo"><div class="atrack">'+(title||url.split('/').pop())+'</div><div class="aprog" id="aprog"><div class="apfill" id="apfill"></div></div><div class="atime" id="atime">0:00 / 0:00</div></div><div class="avol"><svg viewBox="0 0 20 16"><path d="M1 5h4l5-4v14l-5-4H1V5z"/><path d="M13 5.5a5 5 0 010 5"/></svg><input type="range" class="avolin" id="avolin" min="0" max="1" step=".01" value="1" oninput="setAV(this.value)"/></div></div>';aEl.addEventListener('timeupdate',function(){var p=aEl.duration?aEl.currentTime/aEl.duration*100:0;var f=document.getElementById('apfill');if(f)f.style.width=p+'%';var t=document.getElementById('atime');if(t)t.textContent=fmtt(aEl.currentTime)+' / '+fmtt(aEl.duration||0);});aEl.addEventListener('ended',function(){var b=document.getElementById('apbtn');if(b)b.classList.remove('pl');});document.getElementById('aprog').addEventListener('click',function(e){if(!aEl.duration)return;var r=this.getBoundingClientRect();aEl.currentTime=(e.clientX-r.left)/r.width*aEl.duration;});}
function toggleA(){if(!aEl)return;var b=document.getElementById('apbtn');if(aEl.paused){aEl.play();b.classList.add('pl');}else{aEl.pause();b.classList.remove('pl');}}
function setAV(v){if(aEl)aEl.volume=parseFloat(v);}
function renderMedia(d){var mw=document.getElementById('mwrap'),yc=document.getElementById('ytC'),ac=document.getElementById('auC');yc.innerHTML='';ac.innerHTML='';var has=false;if(d.yt){var id=ytid(d.yt);if(id){yc.innerHTML='<div class="yt-frame"><iframe src="https://www.youtube.com/embed/'+id+'?rel=0&modestbranding=1" allowfullscreen allow="autoplay;picture-in-picture"></iframe></div>';has=true;}}if(d.au){buildAudio(d.au,d.auTitle);has=true;}mw.classList.toggle('active',has);}
function openMM(){if(!unlocked)return;var d=mload();document.getElementById('ytin').value=d.yt||'';document.getElementById('auin').value=d.au||'';document.getElementById('autitle').value=d.auTitle||'';document.getElementById('mmbg').classList.add('open');}
function closeMM(){document.getElementById('mmbg').classList.remove('open');}
function saveMedia(){var d={yt:document.getElementById('ytin').value.trim(),au:document.getElementById('auin').value.trim(),auTitle:document.getElementById('autitle').value.trim()};msave2(d);renderMedia(d);closeMM();tip('Medias enregistres');}
function clearMedia(){msave2({});renderMedia({});closeMM();tip('Medias supprimes');}
var tipt;
function tip(m){var el=document.getElementById('tip');el.textContent=m;el.classList.add('show');clearTimeout(tipt);tipt=setTimeout(function(){el.classList.remove('show');},2000);}
render();revealPg(0);renderMedia(mload());
</script>
</body>
</html>
